[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["venv", "frontend/node_modules", "frontend/dist", "release", "release-backend"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"server.py" = ["E402"]
"tools/*.py" = ["E402"]
"tests/*.py" = ["E402"]
