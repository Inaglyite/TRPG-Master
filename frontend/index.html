<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>疯狂宅邸 — TRPG Agent</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- 顶栏 -->
    <header id="header">
      <h1>🏛 疯狂宅邸<span id="conn-status" class="connecting" title="连接中…"></span></h1>
      <div id="toolbar">
        <button id="btn-save" title="快速存档" aria-label="快速存档">💾</button>
        <button id="btn-load" title="存档管理" aria-label="打开存档管理">📂</button>
        <button id="btn-new" title="新游戏" aria-label="开始新游戏">🆕</button>
        <button id="btn-panel" title="角色/线索" aria-label="打开角色和线索面板">📋</button>
        <button id="btn-model-settings" title="模型设置" aria-label="打开模型设置">⚙</button>
      </div>
    </header>

    <!-- 主体 -->
    <main id="main">
      <!-- 聊天区 -->
      <div id="handout-container"></div>
      <div id="chat-panel">
        <div id="messages"></div>
        <div id="bottom">
          <div id="options-bar"></div>
          <div id="input-bar">
            <input id="user-input" type="text" placeholder="等待守秘人叙述……" disabled />
            <button id="btn-send" disabled>⏎</button>
          </div>
        </div>
      </div>

      <!-- 角色面板 -->
      <aside id="char-panel" class="collapsed">
        <div id="char-content">
          <h3 id="char-name">调查员</h3>
          <p class="sub" id="char-occupation">档案载入中…</p>
          <div class="stat-row"><span>HP</span> <span id="hp-bar">-- / --</span></div>
          <div class="stat-row"><span>SAN</span> <span id="san-bar">-- / --</span></div>
          <hr />
          <div id="attr-list"></div>
          <hr />
          <h4>物品</h4>
          <div id="inv-list"></div>
          <hr />
          <h4>线索册</h4>
          <div id="clues-list"></div>
        </div>
      </aside>
    </main>

    <!-- 开始游戏遮罩 -->
    <div id="start-overlay">
      <div id="start-box">
        <section id="start-menu-view" class="start-view" aria-label="主菜单">
          <div class="start-brand">
            <div id="start-title">疯狂宅邸</div>
            <div id="start-subtitle">A TRPG of Madness &amp; Mystery</div>
          </div>

          <div id="module-selector">
            <label for="module-select">当前模组</label>
            <div class="module-select-row">
              <select id="module-select" aria-label="选择模组"></select>
              <button id="btn-import-module" type="button" title="导入 .trpgmod 模组包">⇧ <span>导入模组</span></button>
            </div>
            <input id="module-file-input" type="file" accept=".trpgmod,application/zip" hidden />
            <div id="module-import-status" aria-live="polite"></div>
          </div>

          <nav class="start-menu-actions" aria-label="游戏菜单">
            <button id="btn-start" class="start-art-button" type="button" aria-label="开始新游戏" disabled>
              <span class="start-menu-icon" aria-hidden="true">▶</span>
              <span id="start-new-label">开始新游戏</span>
            </button>
            <button id="btn-continue" class="start-art-button" type="button" aria-label="从存档开始" disabled>
              <span class="start-menu-icon" aria-hidden="true">▤</span>
              <span>从存档开始</span>
            </button>
            <button id="btn-settings" class="start-menu-button" type="button">
              <span class="start-menu-icon" aria-hidden="true">⚙</span>
              <span>模型设置</span>
            </button>
            <button id="btn-exit" class="start-menu-button start-menu-exit" type="button" hidden>
              <span class="start-menu-icon" aria-hidden="true">⏻</span>
              <span>退出游戏</span>
            </button>
          </nav>
          <div id="start-hint" aria-live="polite">正在读取存档…</div>
        </section>

        <section id="character-select-view" class="start-view hidden" aria-label="调查员选择">
          <header class="character-select-header">
            <button id="btn-character-back" type="button" class="character-back-button" aria-label="返回主菜单" title="返回主菜单">
              <span aria-hidden="true">←</span>
              <span>返回主菜单</span>
            </button>
            <div class="character-select-heading">
              <h2>选择调查员</h2>
              <div id="character-module-name">当前模组</div>
            </div>
          </header>

          <div class="investigator-layout">
            <section id="character-selector" class="character-roster" aria-label="可用调查员">
              <div class="character-roster-title">可用调查员</div>
              <div id="character-choice-list"></div>
            </section>
            <aside id="character-detail" aria-live="polite">
              <div class="character-detail-empty">正在读取调查员档案…</div>
            </aside>
          </div>

          <footer class="character-select-footer">
            <span id="character-selected-summary">等待角色列表…</span>
            <button id="btn-character-confirm" type="button" disabled>以此调查员开始</button>
          </footer>
        </section>
      </div>
    </div>

    <!-- 确认弹窗 -->
    <div id="modal-overlay" class="hidden">
      <div id="modal-box">
        <p id="modal-text"></p>
        <div id="modal-actions">
          <button id="modal-yes" class="btn-danger">🎲 确定尝试</button>
          <button id="modal-no" class="btn-safe">↩ 放弃</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 存档管理面板 -->
  <div id="save-panel-overlay" class="hidden">
    <div id="save-panel">
      <div id="save-panel-header">
        <h3 id="save-panel-title">💾 存档管理</h3>
        <button id="save-panel-close" class="panel-close-btn">关闭</button>
      </div>
      <div id="save-panel-body">
        <button id="save-panel-new" class="save-new-btn">➕ 新建存档</button>
        <div id="save-panel-list"></div>
      </div>
    </div>
  </div>

  <!-- 模组导入预览 -->
  <div id="module-import-overlay" class="hidden">
    <div id="module-import-panel" role="dialog" aria-modal="true" aria-labelledby="module-import-title">
      <div class="module-import-header">
        <div>
          <div class="module-import-eyebrow">TRPGMOD / PACKAGE REVIEW</div>
          <h2 id="module-import-title">导入模组</h2>
        </div>
        <button id="module-import-close" type="button" title="关闭" aria-label="关闭模组导入">✕</button>
      </div>
      <div class="module-import-body">
        <h3 id="module-import-name">正在检查模组包…</h3>
        <div id="module-import-meta"></div>
        <p id="module-import-description"></p>
        <div id="module-import-warnings" class="hidden">
          <div class="module-import-warning-title">导入前请确认</div>
          <ul id="module-import-warning-list"></ul>
        </div>
        <div id="module-import-error" class="hidden" aria-live="assertive"></div>
      </div>
      <div class="module-import-actions">
        <button id="module-import-cancel" type="button">取消</button>
        <button id="module-import-confirm" type="button" disabled>导入并切换</button>
      </div>
    </div>
  </div>

  <!-- 模型路由设置 -->
  <div id="model-settings-overlay" class="hidden">
    <div id="model-settings-panel" role="dialog" aria-modal="true" aria-labelledby="model-settings-title">
      <header class="model-settings-header">
        <div>
          <div class="model-settings-eyebrow">KEEPER / MODEL ROUTING</div>
          <h2 id="model-settings-title">模型设置</h2>
        </div>
        <button id="model-settings-close" type="button" title="关闭" aria-label="关闭模型设置">✕</button>
      </header>

      <div class="model-settings-body">
        <div id="model-preset-control" class="model-preset-control" role="group" aria-label="模型预设">
          <button type="button" data-model-preset="pro">全 Pro</button>
          <button type="button" data-model-preset="balanced">均衡</button>
          <button type="button" data-model-preset="flash">全 Flash</button>
        </div>

        <div class="model-role-grid">
          <label class="model-role-field" for="narrative-model-input">
            <span>叙述模型</span>
            <input id="narrative-model-input" list="model-id-options" autocomplete="off" spellcheck="false" />
          </label>
          <label class="model-role-field" for="judgement-model-input">
            <span>判定模型</span>
            <input id="judgement-model-input" list="model-id-options" autocomplete="off" spellcheck="false" />
          </label>
          <datalist id="model-id-options"></datalist>
        </div>

        <div id="model-settings-status" aria-live="polite"></div>
      </div>

      <footer class="model-settings-actions">
        <button id="model-settings-cancel" type="button">取消</button>
        <button id="model-settings-save" type="button">应用设置</button>
      </footer>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
